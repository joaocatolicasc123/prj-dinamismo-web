<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de usuários e posts</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Lista de Usuários e Posts</h1>
    </header>
    <main class="container">
        <section class="coluna">
            <h2>Usuários</h2>
            <form id="form-usuario">
                <input type="hidden" id="usuario-id">
                <input type="text" id="usuario-nome" placeholder="Nome" required>
                <button type="submit" id="btn-usuario">Adicionar Usuário</button>
            </form>
            <ul id="lista-usuarios"></ul>
        </section>

        <section class="coluna">
            <h2>Posts</h2>
            <form id="form-posts">
                <input type="hidden" id="posts-id">
                <input type="text" id="post-titulo" placeholder="Titulo" required>
                <textarea id="post-corpo" placeholder="Conteudo do post" required></textarea>
                <button type="submit" id="btn-post">Adicionar Post</button>
            </form>
            <ul id="lista-posts"></ul>
        </section>
    </main>
</body>
<script src="script.js"></script>
</html>
