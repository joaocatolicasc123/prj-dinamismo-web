<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid7</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Grid7</h1>
</header>

<main class="conteudo">

    <section class="formularios">

        <div class="box">
            <h2>Usuários</h2>

            <form id="form-usuario">
                <input type="hidden" id="usuario-id">
                <input type="text" id="usuario-nome" placeholder="Nome do usuário" required>

                <button type="submit" id="btn-usuario">
                    Adicionar Usuário
                </button>
            </form>
        </div>

        <div class="box">
            <h2>Posts</h2>

            <form id="form-posts">
                <input type="hidden" id="posts-id">

                <select id="post-userId" required>
                    <option value="">Selecione um autor</option>
                </select>

                <input type="text" id="post-titulo" placeholder="Título" required>

                <textarea
                    id="post-corpo"
                    placeholder="Conteúdo do post"
                    required
                ></textarea>

                <button type="submit" id="btn-post">
                    Adicionar Post
                </button>
            </form>
        </div>

    </section>

    <section class="box">
        <h2>Usuários Cadastrados</h2>
        <ul id="lista-usuarios"></ul>
    </section>

    <section class="box">
        <h2>Posts Cadastrados</h2>
        <ul id="lista-posts"></ul>
    </section>

</main>

<script src="script.js"></script>

</body>
</html>
